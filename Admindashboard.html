<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #007BFF;
      color: white;
    }

    .logout {
      float: right;
      background: red;
      color: white;
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .search {
      width: 97%;
      padding: 10px;
      margin-top: 10px;
    }

    .online-box {
      margin-top: 20px;
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Admin Dashboard</h1>

  <button class="logout" onclick="logout()">Logout</button>

  <button onclick="deleteLogs()" style="background:red;color:white;padding:10px;border:none;border-radius:5px;">
    Delete All Logs
  </button>

  <button onclick="forceLogoutAll()" style="background:black;color:white;padding:10px;border:none;border-radius:5px;">
    Force Logout All Users
  </button>

  <input type="text" id="search" class="search" placeholder="Search email..." onkeyup="filterTable()">

  <table id="logTable">
    <thead>
      <tr>
        <th>Email</th>
        <th>IP</th>
        <th>City</th>
        <th>Country</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- 🟢 ONLINE USERS -->
  <div class="online-box">
    <h2>🟢 Online Users</h2>
    <div id="onlineList"></div>
  </div>
</div>

<script type="module" src="https://protectedsite123.vercel.app/adminpanel.js"></script>
</script>

</body>
</html>
